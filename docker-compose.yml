services:
  postgres:
    image: postgres:16-alpine
    container_name: framework2027-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-framework}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-framework_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-framework2027}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U framework -d framework2027"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: framework2027-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@framework2027.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
